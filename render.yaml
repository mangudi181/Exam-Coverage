databases:
  - name: exam-coverage-db
    plan: free
    region: singapore

services:
  - type: web
    name: exam-coverage-backend
    env: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exam-coverage-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
